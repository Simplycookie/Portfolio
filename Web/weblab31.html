<!DOCTYPE html>
<html>
    <Head><h4>Register for a new Account</h4></Head>
    <meta charset="UTF-8">
    <title>Sign-up</title>
    <body>
        <form action="SIGN UP">
           <p>Name : <input type="text" id="namei"size="50" maxlength="55" placeholder="Type your name here"></p> 
           <p>Password : <input type="password" id="passwordi"></p>
           <p>Email : <input type="email" id="emaili"></p>
           <p>Account Type : <input type="radio" id="Member" value="Member" name="account_box">Member<input type="radio" id="Retailer" value="Retailer" name="account_box">Retailer</p>
           <p>If you are a Retailer, describe your business : <br>
            <textarea name="description of business" rows="4" cols="60" id=""></textarea> </p>
           <p>You Birthday : <input type="date"  id="birthday" max="2000-12-12"></p>
           <p>How did you hear about us? <ul>
                <li><input type="checkbox" id="SearchEBox">Search Engine</li>
                <li><input type="checkbox" id="FacebookBox">Facebook</li>
                <li><input type="checkbox" id="FriendsBox">Friends</li>
                <li><input type="checkbox" id="OthersBox">Others</li>
           </ul></p>
           <input type="submit" value="SIGN UP">
        </form>
    </body>
</html>
