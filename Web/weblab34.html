<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>--Best Property Agent</title>
</head>
<body>
    <h3><u>Property Search</u></h3>

    <form name="contactfrm">

        <p>Agent Name: <input type="text" name="agent_name" size="50" maxlength="45" required></p>
        <p>Notification Type: 
            <input type="checkbox" name="notice_type" value="1">Email
            <input type="checkbox" name="notice_type" value="2">Whatsapp
            <input type="checkbox" name="notice_type" value="3">Phone Call
        </p>
        <p>Number of Units required:
            <input type="number" min="1" max="20" value="3">
        </p>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15947.024897301018!2d102.26913911891378!3d2.2449064738200417!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31d1ef8caa508dc9%3A0xeb1a289df65c0c12!2s75450+Bukit+Beruang%2C+Melaka!5e0!3m2!1sen!2smy!4v1447419960281%22" 
        frameborder="1,1,0,0" ></iframe>
    </form>
    <p><input type="submit" name="Request" value="Request Property">
    <input type="submit" name="clear" value="Clear"></p>
</body>
</html>
